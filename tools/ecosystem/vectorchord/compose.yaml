name: ivorysql-vectorchord

x-vector-environment: &vector-environment
  IVORYSQL_HOST: database
  IVORYSQL_PORT: "5333"
  IVORYSQL_DATABASE: ${IVORYSQL_DATABASE:-vectordb}
  IVORYSQL_USER: ${IVORYSQL_USER:-ivorysql}
  IVORYSQL_PASSWORD: ${IVORYSQL_PASSWORD:?set IVORYSQL_PASSWORD}
  VECTOR_SCHEMA: ${VECTOR_SCHEMA:-ai}
  VECTOR_TABLE: ${VECTOR_TABLE:-documents}
  VECTOR_INDEX_NAME: ${VECTOR_INDEX_NAME:-documents_embedding_vchordrq}
  VECTOR_DIMENSION: ${VECTOR_DIMENSION:-128}
  VECTOR_DISTANCE_METRIC: ${VECTOR_DISTANCE_METRIC:-cosine}
  VECTOR_DATASET_ROWS: ${VECTOR_DATASET_ROWS:-25000}
  VECTOR_LIST_COUNT: ${VECTOR_LIST_COUNT:-64}
  VECTOR_PROBES: ${VECTOR_PROBES:-64}
  VECTOR_EPSILON: ${VECTOR_EPSILON:-4.0}
  VECTOR_BUILD_THREADS: ${VECTOR_BUILD_THREADS:-4}
  VECTOR_SAMPLING_FACTOR: ${VECTOR_SAMPLING_FACTOR:-64}
  VECTOR_RESIDUAL_QUANTIZATION: ${VECTOR_RESIDUAL_QUANTIZATION:-true}
  VECTOR_SPHERICAL_CENTROIDS: ${VECTOR_SPHERICAL_CENTROIDS:-true}
  VECTOR_QUERY_COUNT: ${VECTOR_QUERY_COUNT:-20}
  VECTOR_NEIGHBORS: ${VECTOR_NEIGHBORS:-10}
  VECTOR_MIN_AVERAGE_RECALL: ${VECTOR_MIN_AVERAGE_RECALL:-0.90}
  VECTOR_MIN_QUERY_RECALL: ${VECTOR_MIN_QUERY_RECALL:-0.70}
  VECTOR_MAXIMUM_P95_MS: ${VECTOR_MAXIMUM_P95_MS:-500}
  VECTOR_MAX_INDEX_TABLE_RATIO: ${VECTOR_MAX_INDEX_TABLE_RATIO:-1.50}

services:
  database:
    build:
      context: ../../..
      dockerfile: tools/ecosystem/vectorchord/Dockerfile
      args:
        IVORYSQL_REF: ${IVORYSQL_REF:-IvorySQL_5.4}
        PGVECTOR_VERSION: ${PGVECTOR_VERSION:-v0.8.5}
        VECTORCHORD_VERSION: ${VECTORCHORD_VERSION:-1.1.1}
        RUST_VERSION: ${RUST_VERSION:-1.93.0}
    image: ivorysql/vectorchord:${IVORYSQL_IMAGE_TAG:-5.4-vchord-1.1.1}
    restart: unless-stopped
    environment:
      <<: *vector-environment
    ports:
      - "${IVORYSQL_HOST_PORT:-5333}:5333"
    volumes:
      - database-data:/var/lib/ivorysql/data
    shm_size: ${IVORYSQL_SHM_SIZE:-1gb}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          PGPASSWORD=$${IVORYSQL_PASSWORD}
          pg_isready -h 127.0.0.1 -p 5333 -U $${IVORYSQL_USER} -d $${IVORYSQL_DATABASE}
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    stop_grace_period: 60s

  verifier:
    image: ivorysql/vectorchord:${IVORYSQL_IMAGE_TAG:-5.4-vchord-1.1.1}
    profiles: ["verify"]
    depends_on:
      database:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/verify-search"]
    environment:
      <<: *vector-environment
    volumes:
      - benchmark-reports:/reports

volumes:
  database-data:
  benchmark-reports:

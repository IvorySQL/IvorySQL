name: ivorysql-wal2json

services:
  database:
    build:
      context: ../../..
      dockerfile: tools/ecosystem/wal2json/Dockerfile
      args:
        IVORYSQL_REF: ${IVORYSQL_REF:-IvorySQL_5.4}
        WAL2JSON_REF: ${WAL2JSON_REF:-79d516e60463be3093ff927ba72cf6354bde09af}
    image: ivorysql/wal2json:${IVORYSQL_IMAGE_TAG:-5.4-wal2json}
    restart: unless-stopped
    environment:
      IVORYSQL_PORT: "5333"
      IVORYSQL_DATABASE: ${IVORYSQL_DATABASE:-cdcdb}
      IVORYSQL_USER: ${IVORYSQL_USER:-ivorysql}
      IVORYSQL_PASSWORD: ${IVORYSQL_PASSWORD:?set IVORYSQL_PASSWORD}
      CDC_SLOT: ${CDC_SLOT:-ivorysql_cdc}
      CDC_SCHEMA: ${CDC_SCHEMA:-cdc}
      CDC_TABLES: ${CDC_TABLES:-cdc.accounts,cdc.staging}
      CDC_REPORT_DIR: /var/lib/ivorysql/reports
      CDC_MIN_INSERTS: ${CDC_MIN_INSERTS:-4}
      CDC_MIN_UPDATES: ${CDC_MIN_UPDATES:-2}
      CDC_MIN_DELETES: ${CDC_MIN_DELETES:-1}
      CDC_MIN_TRUNCATES: ${CDC_MIN_TRUNCATES:-1}
      CDC_MAX_SLOT_LAG: ${CDC_MAX_SLOT_LAG:-16MiB}
      CDC_REQUIRE_TRANSACTION_MARKERS: ${CDC_REQUIRE_TRANSACTION_MARKERS:-true}
      CDC_REQUIRE_XIDS: ${CDC_REQUIRE_XIDS:-true}
      CDC_REQUIRE_TIMESTAMPS: ${CDC_REQUIRE_TIMESTAMPS:-true}
      CDC_REQUIRE_TYPES: ${CDC_REQUIRE_TYPES:-true}
      CDC_REQUIRE_PRIMARY_KEYS: ${CDC_REQUIRE_PRIMARY_KEYS:-true}
    ports:
      - "${IVORYSQL_HOST_PORT:-5333}:5333"
    volumes:
      - database-data:/var/lib/ivorysql/data
      - cdc-reports:/var/lib/ivorysql/reports
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5333 -U ${IVORYSQL_USER:-ivorysql} -d ${IVORYSQL_DATABASE:-cdcdb}"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    stop_grace_period: 60s

volumes:
  database-data:
  cdc-reports:

name: Ecosystem VectorChord integration

on:
  push:
    branches: [agent/vectorchord-search]
    paths:
      - tools/ecosystem/vectorchord/**
      - .github/workflows/ecosystem_vectorchord.yml
  pull_request:
    paths:
      - tools/ecosystem/vectorchord/**
      - .github/workflows/ecosystem_vectorchord.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tools/ecosystem/vectorchord
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run harness unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate shell syntax
        run: bash -n scripts/*.sh
      - name: Validate Compose model
        run: |
          cp .env.example .env
          docker compose config --quiet
      - name: Check patch whitespace
        run: git show --check --oneline HEAD -- .github/workflows/ecosystem_vectorchord.yml tools/ecosystem/vectorchord

  integration:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: tools/ecosystem/vectorchord
    steps:
      - uses: actions/checkout@v4
      - name: Configure test secrets
        run: cp .env.example .env
      - name: Build and start database
        run: make build up
      - name: Verify vector search quality
        run: make verify
      - name: Collect service logs
        if: failure()
        run: docker compose logs --no-color --tail 200
      - name: Remove test cluster
        if: always()
        run: make clean

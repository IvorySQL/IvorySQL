name: oracle_regression

on:
  push:
    branches: [ master , IVORY_REL_4_STABLE , IVORYSQL_REL_1_STABLE]
  pull_request:
    branches: [ master , IVORY_REL_4_STABLE , IVORYSQL_REL_1_STABLE]

jobs:
  oracle_regression:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
    - uses: actions/checkout@v3
    - name: dependancy
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git lcov bison flex \
              libkrb5-dev libssl-dev libldap-dev libpam-dev python3-dev \
              tcl-dev libperl-dev gettext libxml2-dev libxslt-dev \
              libreadline-dev libedit-dev uuid-dev libossp-uuid-dev \
              libipc-run-perl libtime-hires-perl libtest-simple-perl \
              libicu-dev libnuma-dev
    - name: configure - linux
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
        curl -L -o cpanm http://cpanmin.us && chmod +x cpanm && \
        ./cpanm --sudo IPC::Run && \
        ./configure \
            --prefix=$PWD/inst \
            --enable-cassert --enable-debug --enable-tap-tests --enable-rpath \
            --with-tcl --with-python --with-gssapi --with-pam --with-ldap \
            --with-openssl --with-libedit-preferred --with-uuid=e2fs \
            --with-ossp-uuid  --with-libxml --with-libxslt  --with-perl \
            --with-icu --with-libnuma --enable-injection-points --enable-nls
    - name: compile
      run: make && make install

    - name: oracle_regression
      run: |
        set -euo pipefail
        RETRIES=3
        for i in $(seq 1 $RETRIES); do
          echo "oracle-check-world 第 $i/$RETRIES 次尝试"
          if make oracle-check-world; then
            echo "oracle-check-world 测试执行成功"
            exit 0
          fi
          # 失败时打印日志尾部，方便排查
          echo "===== 打印失败日志 ====="
          [ -f src/oracle_test/regress/regression.out ] && tail -n 200 src/oracle_test/regress/regression.out || true
          [ -f src/oracle_test/regress/regression.diffs ] && tail -n 200 src/oracle_test/regress/regression.diffs || true
          if [ "$i" -lt "$RETRIES" ]; then
            sleep $((i * 10))
            echo "等待后重试..."
          else
            echo "所有重试全部失败"
            exit 1
          fi
        done

    - name: collect files
      if: failure()
      run: |
          find . \( -name "*.diffs" -or -name "oracle_regression.out" -or -path \*/tmp_check/log -or -path \*src/test/regress/log \) -print0 |
                xargs -0 tar -czf oracle_regression.tar.gz
    - name: upload oracle_regression files
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: results
        path: ${{ github.workspace }}/oracle_regression.tar.gz

